    let selectedFiles = {};  // path -> File object
    
    function log(msg, cls='') {
      const div = document.getElementById('log');
      const line = document.createElement('div');
      if (cls) line.className = cls;
      line.textContent = new Date().toISOString().slice(11,23) + ' ' + msg;
      div.appendChild(line);
      div.scrollTop = div.scrollHeight;
    }
    
    document.getElementById('fileInput').addEventListener('change', function(e) {
      selectedFiles = {};
      for (const file of e.target.files) {
        // file.name is just the filename, we need relative path
        // webkitRelativePath gives "site/images/xxx.png" when directory selected
        // or just the filename if individual files selected
        const rel = file.webkitRelativePath || file.name;
        selectedFiles[file.name] = file;
        // Also index by full relative path
        selectedFiles[rel] = file;
      }
      log(`Selected ${e.target.files.length} files`, 'info');
      document.getElementById('uploadBtn').style.display = 'inline';
      document.getElementById('status').textContent = `${e.target.files.length} files selected. Click Start Upload.`;
    });
    
    async function uploadFile(path, file) {
      const resp = await fetch(`https://api.netlify.com/api/v1/deploys/${DEPLOY_ID}/files${path}`, {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${TOKEN}`,
          'Content-Type': 'application/octet-stream'
        },
        body: file
      });
      if (\!resp.ok) {
        const txt = await resp.text();
        throw new Error(`${resp.status}: ${txt.slice(0,100)}`);
      }
      return true;
    }
    
    async function startUpload() {
      document.getElementById('uploadBtn').disabled = true;
      const prog = document.getElementById('prog');
      prog.style.display = 'block';
      
      log(`Starting upload to deploy ${DEPLOY_ID}`, 'info');
      
      let uploaded = 0, failed = 0, skipped = 0;
      const fileList = Object.values(selectedFiles).filter((f, i, arr) => {
        // Deduplicate by file object reference
        return arr.findIndex(x => x === f) === i;
      });
      const total = fileList.length;
      
      log(`Processing ${total} unique files`, 'info');
      
      // Build a map of filename -> netlifiy path
      // Try to match files by name to required paths
      const nameToPath = {};
      for (const [sha1, relPath] of Object.entries(SHA1_MAP)) {
        const parts = relPath.split('/');
        const fname = parts[parts.length - 1];
        nameToPath[fname] = relPath;
      }
      
      // Process files in batches of 5
      const BATCH = 5;
      const fileArr = Array.from(document.getElementById('fileInput').files);
      
      for (let i = 0; i < fileArr.length; i += BATCH) {
        const batch = fileArr.slice(i, i + BATCH);
        await Promise.all(batch.map(async (file) => {
          // Find the netlify path for this file
          let netlifyPath = nameToPath[file.name];
          if (\!netlifyPath) {
            log(`SKIP ${file.name} - no matching path`, 'info');
            skipped++;
            return;
          }
          try {
            await uploadFile(netlifyPath, file);
            uploaded++;
            log(`OK ${netlifyPath}`, 'ok');
          } catch(e) {
            failed++;
            log(`ERR ${netlifyPath}: ${e.message}`, 'err');
          }
        }));
        prog.value = Math.round(((i + BATCH) / fileArr.length) * 100);
      }
      
      log(`Done: ${uploaded} uploaded, ${failed} failed, ${skipped} skipped`, 'info');
      document.getElementById('status').textContent = `Upload complete: ${uploaded} uploaded, ${failed} failed`;
      
      // Check deploy status
      try {
        const sr = await fetch(`https://api.netlify.com/api/v1/deploys/${DEPLOY_ID}`, {
          headers: { 'Authorization': `Bearer ${TOKEN}` }
        });
        const sd = await sr.json();
        log(`Deploy state: ${sd.state}`, 'info');
        log(`Deploy URL: ${sd.deploy_ssl_url || sd.ssl_url || sd.url}`, 'ok');
        document.getElementById('status').textContent += ` | Deploy: ${sd.state}`;
      } catch(e) {
        log(`Could not check status: ${e.message}`, 'err');
      }
    }
  </script>
