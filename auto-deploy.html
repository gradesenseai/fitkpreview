function log(msg, cls) {
  const d = document.getElementById('log');
  const p = document.createElement('p');
  p.className = cls || '';
  p.textContent = msg;
  d.appendChild(p);
  console.log('DEPLOY_LOG:' + msg);
}

function b64ToBuffer(b64) {
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf.buffer;
}

async function run() {
  const entries = Object.entries(FILES);
  log('Starting upload of ' + entries.length + ' files...');
  let ok = 0, fail = 0;
  for (const [path, b64] of entries) {
    try {
      const r = await fetch('https://api.netlify.com/api/v1/deploys/' + DEPLOY_ID + '/files' + path, {
        method: 'PUT',
        headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/octet-stream' },
        body: b64ToBuffer(b64)
      });
      if (r.ok) { ok++; log('OK ' + path, 'ok'); }
      else { fail++; const t = await r.text(); log('FAIL ' + path + ' ' + r.status + ': ' + t.slice(0,80), 'err'); }
    } catch(e) { fail++; log('ERR ' + path + ': ' + e.message, 'err'); }
  }
  log('Done: ' + ok + ' ok, ' + fail + ' failed');
  console.log('DEPLOY_DONE:ok=' + ok + ',fail=' + fail);
}

run();
